# AlertManager 配置
# 支持多种告警通道：Webhook、Email、Slack、Discord 等

global:
  # 默认告警间隔，避免告警风暴
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # 按 severity 分组
  group_by: ['severity', 'service']

# 路由规则
route:
  receiver: 'default-receiver'

  # 子路由：不同严重级别走不同通道
  routes:
    # Critical 级别：立即通知，多次重复
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 1h
      continue: true

    # Warning 级别：聚合通知
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 4h

    # Info 级别：仅记录
    - match:
        severity: info
      receiver: 'info-alerts'
      repeat_interval: 24h

# 接收器配置
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://discord-bot:8080/alerts/webhook'
        send_resolved: true

  # Critical 告警：多通道通知
  - name: 'critical-alerts'
    # Discord Webhook（推荐）
    discord_configs:
      - webhook_url: '${DISCORD_ALERT_WEBHOOK_URL}'
        title: '🚨 Critical Alert'
        message: '{{ .CommonAnnotations.summary }}'
        send_resolved: true

    # 备用 Webhook
    webhook_configs:
      - url: 'http://discord-bot:8080/alerts/critical'
        send_resolved: true

  # Warning 告警：单通道
  - name: 'warning-alerts'
    discord_configs:
      - webhook_url: '${DISCORD_ALERT_WEBHOOK_URL}'
        title: '⚠️ Warning Alert'
        message: '{{ .CommonAnnotations.summary }}'

  # Info 告警：仅 Webhook
  - name: 'info-alerts'
    webhook_configs:
      - url: 'http://discord-bot:8080/alerts/info'
        send_resolved: false

# 静默规则（可选）
