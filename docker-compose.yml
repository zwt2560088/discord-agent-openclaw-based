version: '3.8'

services:
  discord-bot:
    # 从本地 Dockerfile 构建镜像
    build: .

    # 容器名称
    container_name: discord-agent-nba2k26

    # 重启策略：总是重启（崩溃自动恢复）
    restart: always

    # 挂载本地配置文件（实时修改无需重建镜像）
    volumes:
      # 配置文件挂载
      - ./src/.env:/app/src/.env:ro
      - ./bin/.env:/app/bin/.env:ro

      # 数据持久化（知识库、订单数据库等）
      - ./knowledge:/app/knowledge
      - ./knowledge_db:/app/knowledge_db
      - ./data:/app/data
      - ./logs:/app/logs

    # 容器日志配置（防止日志文件过大）
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # 资源限制（可选，防止占用过多系统资源）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

    # 环境变量（如果需要在 Docker 内设置）
    environment:
      - PYTHONUNBUFFERED=1

# 网络配置（可选）
# networks:
#   default:
#     name: discord-bot-network

