global:
  scrape_interval: 15s
  evaluation_interval: 15s

# AlertManager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'discord-bot'
    static_configs:
      - targets: ['localhost:8081']  # 本地 Bot
    metrics_path: '/metrics'

  # PushGateway 配置
  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
    scrape_interval: 5s

  # 压测指标
  - job_name: 'discord_bot_load_test'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
    metrics_path: '/metrics/job/discord_bot_load_test'

